name: CD deploy

on:
  push:
    branches: [main]

# 배포는 취소하지 않고 순차 대기
concurrency:
  group: cd-main
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '26'
          cache: 'gradle'

      - name: 테스트 컨테이너 실행 및 헬스체크
        run: docker compose -f docker-compose.ci.yaml up -d --wait --wait-timeout 120

      - name: 통합 테스트 실행
        run: ./gradlew integrationTest --no-daemon

      - name: 테스트 컨테이너 정리
        if: always()
        run: docker compose -f docker-compose.ci.yaml down -v

      # 빌드 & push
      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: 빌드 & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            mingkiboo/amumal-amon:latest
            mingkiboo/amumal-amon:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # AWS 인증 (OIDC)
      - name: AWS 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ap-northeast-2

        # SSM으로 EC2 배포 (deploy.sh 이용 - 롤백 포함)
        # 새 버전 배포 -> HealthCheck 후 실패 시 이전 이미지로 롤백, 성공 시 변경
      - name: EC2 배포
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          BACKEND_ENV_B64=$(printf '%s' "$BACKEND_ENV" | base64 -w 0)
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[\"cd /home/ubuntu/amumal && ./deploy.sh ${{ github.sha }} '$BACKEND_ENV_B64'\"]" \
            --query "Command.CommandId" --output text)
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" || {
              echo "배포 실패 (deploy.sh에서 롤백됨)"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$EC2_INSTANCE_ID" \
                --query "StandardErrorContent" --output text
              exit 1
            }
