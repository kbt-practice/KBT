name: CD deploy

on:
  push:
    branches: [main]

# 배포는 취소하지 않고 순차 대기
concurrency:
  group: cd-main
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: backend_env
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: amumal_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_HOST: 127.0.0.1
      DB_NAME: amumal_test
      DB_USERNAME: testuser
      DB_PASSWORD: testpass
      DDL_AUTO_SET: create-drop
      MAX_FILE_SIZE: 10MB
      MAX_REQUEST_SIZE: 10MB
      AWS_ACCESS_KEY: test-access-key
      AWS_SECRET_KEY: test-secret-key
      AWS_REGION: ap-northeast-2
      AWS_S3_BUCKET: test-bucket
      JWT_SECRET: c2VjcmV0a2V5c2VjcmV0a2V5c2VjcmV0a2V5c2VjcmV0a2V5
      SERVER_URL: http://localhost
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
    steps:
      - uses: actions/checkout@v4

      - name: 백엔드 환경변수 준비
        shell: bash
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
        run: |
          printf '%s\n' "$BACKEND_ENV" >> "$GITHUB_ENV"
          printf 'BACKEND_ENV_B64=%s\n' "$(printf '%s' "$BACKEND_ENV" | base64 -w 0)" >> "$GITHUB_ENV"

      # 통합 테스트만 진행
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '26'
          cache: 'gradle'

      - name: 외부 서비스 연결 확인 (MySQL, Redis)
        shell: bash
        run: |
          echo > /dev/tcp/127.0.0.1/3306
          echo "MySQL 연결 확인 완료"
          echo > /dev/tcp/127.0.0.1/6379
          echo "Redis 연결 확인 완료"

      - name: 테스트
        run: ./gradlew integrationTest --no-daemon

      # 빌드 & push
      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: 빌드 & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            mingkiboo/amumal-amon:latest
            mingkiboo/amumal-amon:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # AWS 인증 (OIDC)
      - name: AWS 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ap-northeast-2

      # SSM으로 EC2 배포 (deploy.sh 이용 - 롤백 포함)
        # 새 버전 배포 -> HealthCheck 후 실패 시 이전 이미지로 롤백, 성공 시 변경
      - name: EC2 배포
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[\"cd /home/ubuntu/amumal && ./deploy.sh ${{ github.sha }} '$BACKEND_ENV_B64'\"]" \
            --query "Command.CommandId" --output text)
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} || {
              echo "배포 실패 (deploy.sh에서 롤백됨)"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
                --query "StandardErrorContent" --output text
              exit 1
            }
