name: dev merge CI

on:
  push:
    branches: [dev]

concurrency:
  group: ci-dev
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  integration-test:
    name: 통합 테스트
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: amumal_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_HOST: 127.0.0.1
      DB_NAME: amumal_test
      DB_USERNAME: testuser
      DB_PASSWORD: testpass
      DDL_AUTO_SET: create-drop
      MAX_FILE_SIZE: 10MB
      MAX_REQUEST_SIZE: 10MB
      AWS_ACCESS_KEY: test-access-key
      AWS_SECRET_KEY: test-secret-key
      AWS_REGION: ap-northeast-2
      AWS_S3_BUCKET: test-bucket
      JWT_SECRET: c2VjcmV0a2V5c2VjcmV0a2V5c2VjcmV0a2V5c2VjcmV0a2V5
      SERVER_URL: http://localhost
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '26'
          cache: 'gradle'

      - name: 외부 서비스 연결 확인 (MySQL, Redis)
        shell: bash
        run: |
          echo > /dev/tcp/127.0.0.1/3306
          echo "MySQL 연결 확인 완료"
          echo > /dev/tcp/127.0.0.1/6379
          echo "Redis 연결 확인 완료"

      - name: 통합 테스트 실행
        run: ./gradlew integrationTest --no-daemon

  docker-build:
    name: 이미지 빌드 검증
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: 이미지 빌드 검증 (push는 하지 않음)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
