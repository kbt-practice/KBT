name: dev merge CI

on:
  push:
    branches: [dev]

concurrency:
  group: ci-dev
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DB_HOST: 127.0.0.1
      DB_NAME: amumal_test
      DB_USERNAME: testuser
      DB_PASSWORD: testpass
      DDL_AUTO_SET: create-drop
      MAX_FILE_SIZE: 10MB
      MAX_REQUEST_SIZE: 10MB
      AWS_ACCESS_KEY: test-access-key
      AWS_SECRET_KEY: test-secret-key
      AWS_REGION: ap-northeast-2
      AWS_S3_BUCKET: test-bucket
      JWT_SECRET: c2VjcmV0a2V5c2VjcmV0a2V5c2VjcmV0a2V5c2VjcmV0a2V5
      SERVER_URL: http://localhost
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '26'
          cache: 'gradle'

      - name: 테스트 컨테이너 실행 및 헬스체크
        run: docker compose -f docker-compose.ci.yaml up -d --wait --wait-timeout 120

      - name: 통합 테스트 실행
        run: ./gradlew integrationTest --no-daemon

      - name: 테스트 컨테이너 정리
        if: always()
        run: docker compose -f docker-compose.ci.yaml down -v

      - uses: docker/setup-buildx-action@v3
      - name: 이미지 빌드 검증 (push는 하지 않음)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
