name: PR CI

on:
  pull_request:
    branches: [dev]

# 같은 PR에 연속 push 시 이전 CI 취소
concurrency:
  group: ci-pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      - name: 단위 테스트 실행
        run: ./gradlew test --no-daemon
