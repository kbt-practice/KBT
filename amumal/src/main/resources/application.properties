spring.application.name=amumal

spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

file.upload-dir=${UPLOAD_DIR}
file.profile-access-path=${PROFILE_FILE_ACCESS_PATH}
file.posts-access-path=${POSTS_FILE_ACCESS_PATH}

spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE}

jwt.expiration_time=86400000
jwt.secret=${JWT_SECRET}

springdoc.enable-data-rest=false
server.url=${SERVER_URL:http://localhost:8080}

## 로그 파일 이름 설정
#logging.file.name=/home/ubuntu/KBT/amumal/log/app.log
