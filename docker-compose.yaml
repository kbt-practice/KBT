name: amumal-stack

x-amumal-common: &amumal-common
  image: mingkiboo/amumal-amon:${IMAGE_TAG:-latest}
  user: "1000:1000"
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  restart: unless-stopped
  read_only: true
  tmpfs:
    - /tmp
  environment:
    LOGGING_FILE_NAME: /tmp/app.log
  env_file:
    - ${APP_ENV_FILE:-.env}
  extra_hosts:
    - "host.docker.internal:host-gateway"
  healthcheck:
    test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8080'"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 40s
  networks:
    - app_net

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./.deploy/nginx/app-upstream.inc:/etc/nginx/conf.d/app-upstream.inc:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot
    depends_on:
      portainer:
        condition: service_started
    networks:
      - app_net
      - management_net

  amumal_blue:
    <<: *amumal-common

  amumal_green:
    <<: *amumal-common

  socket-proxy:
    image: tecnativa/docker-socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      POST: 1
      EXEC: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - management_net

  portainer:
    image: portainer/portainer-ce:2.39.4
    command: -H tcp://socket-proxy:2375
    restart: always
    volumes:
      - portainer_data:/data
    depends_on:
      - socket-proxy
    healthcheck:
      disable: true
    networks:
      - management_net

networks:
  app_net:
    driver: bridge
  management_net:
    driver: bridge

volumes:
  portainer_data:
    external: true
