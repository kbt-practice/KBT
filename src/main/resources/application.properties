spring.application.name=amumal

spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${DDL_AUTO_SET}
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE}

# AWS S3
aws.credentials.access-key=${AWS_ACCESS_KEY}
aws.credentials.secret-key=${AWS_SECRET_KEY}
aws.region=${AWS_REGION}
aws.s3.bucket=${AWS_S3_BUCKET}

# Access Token: 1시간(ms), Refresh Token: 30일(ms)
jwt.expiration_time=3600000
jwt.refresh_expiration_time=2592000000
jwt.secret=${JWT_SECRET}

server.forward-headers-strategy=framework

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# JSON 직렬화 타임존
spring.jackson.time-zone=Asia/Seoul

springdoc.enable-data-rest=false
server.url=${SERVER_URL}

# 로그 파일 이름 설정
logging.file.name=/home/ubuntu/KBT/amumal/logs/app.log

# 로그 레벨 설정
logging.level.root=INFO
logging.level.com.kbt.amumal=DEBUG

# 하루 단위로 로그를 쪼개기 -> 최대 7일치만 보관, 나머지 삭제
logging.logback.rollingpolicy.max-history=7

# 파일 한 개당 최대 10MB까지만 커지게 제한 (넘으면 .gz 압축)
logging.logback.rollingpolicy.max-file-size=10MB

# 패턴 설정
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n