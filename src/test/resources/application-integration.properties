spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:3306/${DB_NAME:amumal_test}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:testuser}
spring.datasource.password=${DB_PASSWORD:testpass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${DDL_AUTO_SET:create-drop}
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}

aws.credentials.access-key=${AWS_ACCESS_KEY:test-access-key}
aws.credentials.secret-key=${AWS_SECRET_KEY:test-secret-key}
aws.region=${AWS_REGION:ap-northeast-2}
aws.s3.bucket=${AWS_S3_BUCKET:test-bucket}

jwt.expiration_time=3600000
jwt.refresh_expiration_time=2592000000
jwt.secret=${JWT_SECRET:c2VjcmV0a2V5c2VjcmV0a2V5c2VjcmV0a2V5c2VjcmV0a2V5}

spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

server.url=${SERVER_URL:http://localhost}
logging.file.name=build/integration-test.log
